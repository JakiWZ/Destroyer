name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  verify:
    name: Verifica core (destroyer-verify)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Versione Swift
        run: swift --version

      - name: Esegui i controlli del core
        run: swift run destroyer-verify

  build:
    name: Build GUI (Xcode)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Il progetto è generato con un Xcode recente (formato 77): serve Xcode 16+.
      - name: Seleziona Xcode più recente
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || echo /Applications/Xcode.app)"

      - name: Versione Xcode
        run: xcodebuild -version

      - name: Installa XcodeGen
        run: brew install xcodegen

      - name: Genera il progetto Xcode
        run: xcodegen generate

      - name: Build (Debug)
        run: |
          xcodebuild \
            -project Destroyer.xcodeproj \
            -scheme Destroyer \
            -configuration Debug \
            -destination 'platform=macOS' \
            build
