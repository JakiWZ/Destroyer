# Genera Destroyer.xcodeproj con XcodeGen:  brew install xcodegen && xcodegen generate
# Poi apri Destroyer.xcodeproj in Xcode (richiede Xcode completo, non solo Command Line Tools).
name: Destroyer
options:
  bundleIdPrefix: io.github.destroyer
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Destroyer:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Assets.xcassets
      - path: App/Resources               # String Catalog (localizzazione it/en)
      - path: Sources/DestroyerCore   # core compilato nello stesso modulo dell'app
    info:
      path: App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.destroyer.Destroyer
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES          # necessario per la notarizzazione (release)
        CODE_SIGN_ENTITLEMENTS: App/Destroyer.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
